services:
  db:
    image: postgres:18.2
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    volumes:
        # - ./data:/var/lib/postgresql/data
        - ./pginit.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      v0:
        ipv4_address: 10.0.55.5
    ports:
        - "${POSTGRES_PORT}:${POSTGRES_PORT}"

  xampp:
    build: .
    image: xampp
    volumes:
      - ./${ACTIVE_PROJECT}:/www
    networks:
      v0:
        ipv4_address: 10.0.55.10
    ports:
      - 8080:80
      - 8022:22
networks:
  v0:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.55.0/24
